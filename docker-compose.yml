services:
  api1:
    build:
      context: .
      dockerfile: Dockerfile
    image: r-backend-26-api:local
    restart: unless-stopped
    cpuset: "0"
    security_opt:
      - seccomp=unconfined
    environment:
      RINHA_SOCKET: /sockets/api1.sock
      RINHA_C_USE_SIMD_JSON: "0"
      RINHA_C_KD_CHROMATIC: "1"
      RINHA_C_KD_PREFETCH_DIST: "0"
      RINHA_C_INSTRUMENT: "1"
      RINHA_C_INSTRUMENT_INTERVAL_SECS: "10"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.49"
          memory: "160MB"

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    image: r-backend-26-api:local
    restart: unless-stopped
    cpuset: "1"
    security_opt:
      - seccomp=unconfined
    environment:
      RINHA_SOCKET: /sockets/api2.sock
      RINHA_C_USE_SIMD_JSON: "0"
      RINHA_C_KD_CHROMATIC: "1"
      RINHA_C_KD_PREFETCH_DIST: "0"
      RINHA_C_INSTRUMENT: "1"
      RINHA_C_INSTRUMENT_INTERVAL_SECS: "10"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.49"
          memory: "160MB"

  lb:
    build:
      context: .
      dockerfile: Dockerfile.lb
    image: r-backend-26-lb:local
    restart: unless-stopped
    cpuset: "2,3"
    depends_on:
      - api1
      - api2
    environment:
      RINHA_C_LB_ACCEPT_BATCH: "1"
      RINHA_C_LB_SENDMMSG: "1"
      RINHA_C_LB_INSTRUMENT: "1"
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
    deploy:
      resources:
        limits:
          cpus: "0.02"
          memory: "30MB"

volumes:
  sockets:
